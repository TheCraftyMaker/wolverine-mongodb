name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ---------- Library build + pack ----------
  build-library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Build library
        run: dotnet build src/Wolverine.MongoDB/Wolverine.MongoDB.csproj -c Release

      # NOTE: WolverineFx.ComplianceTests is not yet published to NuGet, so the
      # test project cannot build in CI. Once that package ships, uncomment below.
      # - name: Run library tests
      #   run: dotnet test src/Wolverine.MongoDB.Tests/Wolverine.MongoDB.Tests.csproj -c Release --logger "GitHubActions"

      - name: Pack
        run: dotnet pack src/Wolverine.MongoDB/Wolverine.MongoDB.csproj -c Release -o ./artifacts

  # ---------- Demo app build + integration tests ----------
  build-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Build demo solution
        working-directory: demo
        run: dotnet build OrderDemo.slnx -c Release

      - name: Run demo integration tests
        working-directory: demo
        run: dotnet test tests/OrderDemo.IntegrationTests/OrderDemo.IntegrationTests.csproj -c Release --logger "console;verbosity=normal"
