name: Publish to NuGet
on:
  push:
    tags: ['v*']
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Pack
        run: dotnet pack src/Wolverine.MongoDB/Wolverine.MongoDB.csproj -c Release -o ./artifacts -p:Version=${{ steps.version.outputs.VERSION }}
      - name: Push to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
      - name: Push symbols to NuGet
        run: dotnet nuget push "./artifacts/*.snupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
      - name: Bump version in Directory.Build.props
        run: |
          sed -i "s|<Version>.*</Version>|<Version>${{ steps.version.outputs.VERSION }}</Version>|" Directory.Build.props
      - name: Create version bump PR
        uses: peter-evans/create-pull-request@v8
        with:
          base: main
          commit-message: "chore: bump version to ${{ steps.version.outputs.VERSION }}"
          branch: version-bump/${{ steps.version.outputs.VERSION }}
          title: "chore: bump version to ${{ steps.version.outputs.VERSION }}"
          body: "Auto-generated after publishing `${{ steps.version.outputs.VERSION }}` to NuGet."
          labels: automated
