name: Publish to NuGet
on:
  push:
    tags: ['v*']
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Pack
        run: dotnet pack src/Wolverine.MongoDB/Wolverine.MongoDB.csproj -c Release -o ./artifacts -p:Version=${{ steps.version.outputs.VERSION }}
      - name: Push to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
      - name: Push symbols to NuGet
        run: dotnet nuget push "./artifacts/*.snupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! notes="$(bash .github/scripts/extract-changelog.sh "${{ steps.version.outputs.VERSION }}")"; then
            echo "::error::Could not extract CHANGELOG notes for ${{ steps.version.outputs.VERSION }}" >&2
            exit 1
          fi
          prerelease=""
          case "${{ steps.version.outputs.VERSION }}" in
            *-*) prerelease="--prerelease" ;;
          esac
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; updating it."
            gh release edit "${GITHUB_REF_NAME}" --notes "$notes" $prerelease
            gh release upload "${GITHUB_REF_NAME}" ./artifacts/*.nupkg --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              ./artifacts/*.nupkg \
              --title "${GITHUB_REF_NAME}" \
              --notes "$notes" \
              $prerelease
          fi
